<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0f0720"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Antenna base -->
  <rect x="97" y="10" width="6" height="28" rx="3" fill="url(#bodyGrad)"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="10" r="8" fill="#f472b6" filter="url(#glow)"/>
  <circle cx="100" cy="10" r="4" fill="#fce7f3"/>

  <!-- Robot head (rounded rect) -->
  <rect x="28" y="36" width="144" height="120" rx="28" fill="url(#bodyGrad)"/>

  <!-- Inner face panel -->
  <rect x="40" y="48" width="120" height="96" rx="20" fill="url(#faceGrad)"/>

  <!-- Left eye socket -->
  <circle cx="72" cy="92" r="22" fill="#2d1255"/>
  <!-- Left eye glow ring -->
  <circle cx="72" cy="92" r="16" fill="#f472b6" opacity="0.2" filter="url(#softGlow)"/>
  <!-- Left eye -->
  <circle cx="72" cy="92" r="13" fill="#f472b6"/>
  <!-- Left pupil -->
  <circle cx="72" cy="92" r="7" fill="#1a0a2e"/>
  <!-- Left eye shine -->
  <circle cx="76" cy="87" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="67" cy="95" r="1.5" fill="white" opacity="0.5"/>

  <!-- Right eye socket -->
  <circle cx="128" cy="92" r="22" fill="#2d1255"/>
  <!-- Right eye glow ring -->
  <circle cx="128" cy="92" r="16" fill="#c084fc" opacity="0.2" filter="url(#softGlow)"/>
  <!-- Right eye -->
  <circle cx="128" cy="92" r="13" fill="#c084fc"/>
  <!-- Right pupil -->
  <circle cx="128" cy="92" r="7" fill="#1a0a2e"/>
  <!-- Right eye shine -->
  <circle cx="132" cy="87" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="123" cy="95" r="1.5" fill="white" opacity="0.5"/>

  <!-- Mouth panel -->
  <rect x="62" y="120" width="76" height="16" rx="8" fill="#2d1255"/>
  <!-- Mouth LED dots -->
  <circle cx="75" cy="128" r="4" fill="#f472b6" filter="url(#glow)"/>
  <circle cx="88" cy="128" r="4" fill="#f9a8d4"/>
  <circle cx="100" cy="128" r="4" fill="#c084fc" filter="url(#glow)"/>
  <circle cx="112" cy="128" r="4" fill="#f9a8d4"/>
  <circle cx="125" cy="128" r="4" fill="#f472b6" filter="url(#glow)"/>

  <!-- Left ear bolt -->
  <rect x="12" y="82" width="18" height="24" rx="7" fill="url(#bodyGrad)"/>
  <circle cx="21" cy="94" r="5" fill="#fce7f3" opacity="0.5"/>

  <!-- Right ear bolt -->
  <rect x="170" y="82" width="18" height="24" rx="7" fill="url(#bodyGrad)"/>
  <circle cx="179" cy="94" r="5" fill="#fce7f3" opacity="0.5"/>

  <!-- Top head bolts -->
  <circle cx="60" cy="42" r="5" fill="#fce7f3" opacity="0.6"/>
  <circle cx="140" cy="42" r="5" fill="#fce7f3" opacity="0.6"/>

  <!-- Subtle shine on head -->
  <ellipse cx="100" cy="52" rx="40" ry="8" fill="white" opacity="0.08"/>
</svg>
